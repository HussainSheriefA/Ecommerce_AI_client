<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
        .result { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { border-left: 4px solid #4CAF50; }
        .error { border-left: 4px solid #f44336; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>VELUR API Connection Test</h1>
    
    <div>
        <button onclick="testLogin()">Test Login API</button>
        <button onclick="testRegister()">Test Register API</button>
        <button onclick="checkConfig()">Check API URL</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://localhost:8000/api';
        
        function addResult(title, content, isSuccess) {
            const div = document.createElement('div');
            div.className = 'result ' + (isSuccess ? 'success' : 'error');
            div.innerHTML = `<h3>${title}</h3><pre>${JSON.stringify(content, null, 2)}</pre>`;
            document.getElementById('results').appendChild(div);
        }
        
        async function testLogin() {
            try {
                const response = await fetch(`${API_URL}/auth/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', password: 'testpass123' })
                });
                
                const data = await response.json();
                addResult('Login Test', {
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                }, response.ok);
            } catch (error) {
                addResult('Login Error', { message: error.message }, false);
            }
        }
        
        async function testRegister() {
            try {
                const randomEmail = `user${Date.now()}@example.com`;
                const response = await fetch(`${API_URL}/auth/register/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: 'Test User', 
                        email: randomEmail, 
                        password: 'testpass123',
                        password_confirm: 'testpass123'
                    })
                });
                
                const data = await response.json();
                addResult('Register Test', {
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                }, response.ok);
            } catch (error) {
                addResult('Register Error', { message: error.message }, false);
            }
        }
        
        function checkConfig() {
            addResult('API Configuration', {
                API_URL: API_URL,
                time: new Date().toISOString()
            }, true);
        }
    </script>
</body>
</html>
